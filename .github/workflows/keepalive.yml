name: keep-alive

# Pings the live demo so the free Hugging Face Space never goes idle
# (free Spaces sleep after ~48h of inactivity).
on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the live demo
        run: |
          code=$(curl -sS -m 90 -o /dev/null -w "%{http_code}" https://roshaanullahzaheer-scout.hf.space/health)
          echo "health -> $code"
